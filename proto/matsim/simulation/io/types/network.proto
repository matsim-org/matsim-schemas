syntax = "proto3";
import "matsim/simulation/io/types/general.proto";

package matsim.simulation.io.types;

option java_multiple_files = true;
option java_package = "org.matsim.schemas.simulation.io.types";
option java_outer_classname = "NetworkProto";

// this could also include attributes
message Network {
  repeated Node nodes = 1;
  repeated Link links = 2;
  double effectiveCellSize = 3;
}

message Node {
  string id = 1;
  Coordinate coordinate = 2;
  uint32 partition = 4;
  uint32 cmpWeight = 5;
}

message Link {
  string id = 1;
  string from = 2;
  string to = 3;
  double length = 4;
  double capacity = 5;
  double freespeed = 6;
  double permlanes = 7;
  repeated string modes = 8;
  uint32 partition = 9;
}
