syntax = "proto3";

package matsim.simulation.io.types;

option java_multiple_files = true;
option java_package = "org.matsim.schemas.simulation.io.types";
option java_outer_classname = "GeneralProto";

message AttributeValue {
  oneof type {
    int64 int_value = 1;
    string string_value = 2;
    double double_value = 3;
    bool bool_value = 4;
    // to be expanded
  }
}

message Coordinate {
  double x = 1;
  double y = 2;
  double z = 3;
}

